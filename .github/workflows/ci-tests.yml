name: CI Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NO_COLOR: "1"
    steps:
      - name: Check out isaac-agent
        uses: actions/checkout@v4

      - name: Check out isaac (fixture modules)
        run: git clone --depth 1 https://github.com/slagyr/isaac.git ../isaac

      - name: Check out isaac-foundation
        run: git clone --depth 1 https://github.com/slagyr/isaac-foundation.git ../isaac-foundation

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure and Babashka
        uses: DeLaGuardo/setup-clojure@13.2
        with:
          bb: latest
          cli: latest

      - name: Install ripgrep
        shell: bash
        run: |
          if ! command -v rg >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi
          rg --version

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
            .cpcache
          key: ${{ runner.os }}-clojure-agent-${{ hashFiles('**/deps.edn', '**/bb.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-agent-

      - name: Run specs
        run: clojure -M:spec

      - name: Run features - config llm module crew
        id: features_config
        shell: bash
        run: clojure -M:features $(find features/config features/crew features/llm features/module -type f -name '*.feature' | sort)

      - name: Run features - session
        id: features_session
        shell: bash
        run: clojure -M:features $(find features/session -type f -name '*.feature' | sort)

      - name: Run features - bridge comm prompts tagging
        id: features_bridge
        shell: bash
        run: clojure -M:features $(find features/bridge features/comm features/prompts features/tagging -type f -name '*.feature' | sort)

      - name: Run features - tool
        id: features_tool
        shell: bash
        run: clojure -M:features $(find features/tool -type f -name '*.feature' | sort)
